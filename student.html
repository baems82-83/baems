<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Student Portal | BAEMS STUDY</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#182352; --paper:#faf3da; --paper-2:#f1e3ac;
    --lab:#22306e; --amber:#c1451f; --slate:#1f9fc4;
    --line: rgba(24,35,82,0.18); --white:#fffdf6; --danger:#b7291f; --ok:#1d7a4c;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'IBM Plex Sans',sans-serif;}
  h1,h2,h3{font-family:'Fraunces',serif; font-weight:700; margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  header{
    background:var(--ink); color:var(--white); padding:16px 24px;
    display:flex; align-items:center; gap:12px; justify-content:space-between; flex-wrap:wrap;
  }
  header .title{display:flex; align-items:center; gap:12px;}
  header img{width:34px; height:34px; border-radius:50%; background:var(--white); padding:2px;}
  header h1{font-size:18px; color:var(--white);}
  header a.back{color:#c9d0f5; font-size:13px; text-decoration:none;}
  main{max-width:900px; margin:0 auto; padding:32px 20px 80px;}
  .card{background:var(--white); border:1px solid var(--line); border-radius:6px; padding:26px; margin-bottom:20px;}
  label{font-size:12px; text-transform:uppercase; letter-spacing:0.04em; color:#4a524d; display:block; margin:14px 0 5px;}
  label:first-child{margin-top:0;}
  input[type=text], input[type=password]{
    width:100%; padding:11px 12px; border:1px solid var(--ink); border-radius:3px; font-size:14px; background:var(--white); color:var(--ink);
  }
  .btn{
    display:inline-flex; align-items:center; gap:8px; padding:11px 20px; border-radius:3px;
    font-weight:600; font-size:14px; border:1.5px solid var(--ink); cursor:pointer; background:transparent; color:var(--ink);
  }
  .btn-primary{background:var(--amber); border-color:var(--amber); color:#fff;}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .err{color:var(--danger); font-size:13px; margin-top:10px; display:none;}
  .tabs{display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;}
  .tab{padding:9px 16px; border-radius:20px; border:1.5px solid var(--ink); background:transparent; font-weight:600; font-size:13px; cursor:pointer; color:var(--ink);}
  .tab.active{background:var(--ink); color:var(--paper);}
  .file-row{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    border:1px solid var(--line); border-radius:4px; padding:14px 16px; margin-bottom:10px; background:#fffef9;
  }
  .file-row .ftype{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase;
    background:var(--slate); color:#fff; padding:3px 8px; border-radius:3px; margin-right:10px;
  }
  .file-row .fname{font-weight:600; font-size:14.5px;}
  .file-actions{display:flex; gap:8px; flex-shrink:0;}
  .empty-note{color:#7a7360; font-size:14px; padding:20px 0;}
  .small-note{color:#7a7360; font-size:12.5px;}
  .welcome{font-size:14px; color:#3a423e; margin-bottom:18px;}
</style>
</head>
<body>

<header>
  <div class="title">
    <img src="assets/logo.png" alt="logo" onerror="this.style.display='none'">
    <h1>BAEMS STUDY — Student Portal</h1>
  </div>
  <a class="back" href="index.html">← Back to main site</a>
</header>

<main>
  <div class="card" id="loginCard" style="max-width:380px; margin:40px auto;">
    <h2>Student Log In</h2>
    <p class="welcome">Log in with the roll number and password given to you at admission.</p>
    <label>Roll Number</label>
    <input type="text" id="loginRoll">
    <label>Password</label>
    <input type="password" id="loginPass" onkeydown="if(event.key==='Enter') doLogin()">
    <div style="margin-top:16px;">
      <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="doLogin()">Log In</button>
    </div>
    <p class="err" id="loginErr"></p>
  </div>

  <div id="portalArea" style="display:none;">
    <div class="card">
      <h2 id="welcomeName">Welcome</h2>
      <p class="welcome" id="welcomeMeta"></p>
    </div>
    <div class="tabs" id="subjectTabs"></div>
    <div class="card" id="filesCard">
      <div id="filesList"></div>
      <div style="margin-top:16px; padding-top:16px; border-top:1px dashed var(--line);">
        <input type="file" id="uploadInput" style="display:none;" onchange="uploadFile(event)">
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('uploadInput').click()">+ Upload a file to this subject</button>
        <p class="small-note" id="uploadStatus" style="margin-top:8px;"></p>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://xbmdumntkpxafswhbgvb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhibWR1bW50a3B4YWZzd2hiZ3ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NTU0OTgsImV4cCI6MjA5OTMzMTQ5OH0.savMSYTicFxTYbrzrxPeZGLuyNAnNN1ykJL1CpNBmTA';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const BUCKET = 'baems-files';

  let resourcesBySubject = {};
  let currentSubject = '';
  let myName = '';
  const SUBJECTS = ['Physics','Chemistry','Biology','Mathematics','Computer Science','English','Nepali'];

  async function doLogin(){
    const roll = document.getElementById('loginRoll').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    errEl.style.display = 'none';
    if(!roll || !pass){
      errEl.textContent = 'Enter both roll number and password.';
      errEl.style.display = 'block';
      return;
    }
    const { data, error } = await sb.rpc('verify_student_login', { p_roll_no: roll, p_password: pass });
    if(error || !data || !data.length){
      errEl.textContent = 'Roll number or password is incorrect.';
      errEl.style.display = 'block';
      return;
    }
    const match = data[0];
    myName = match.name || 'Student';
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('portalArea').style.display = 'block';
    document.getElementById('welcomeName').textContent = 'Welcome, ' + (match.name || 'Student');
    document.getElementById('welcomeMeta').textContent = [match.class_section, match.major].filter(Boolean).join(' · ');
    await loadResources();
    renderSubjectTabs();
  }

  async function loadResources(){
    const { data, error } = await sb.from('resources').select('*').order('id');
    resourcesBySubject = {};
    if(!error && data){
      data.forEach(r => {
        if(!resourcesBySubject[r.subject]) resourcesBySubject[r.subject] = [];
        resourcesBySubject[r.subject].push(r);
      });
    }
  }

  function renderSubjectTabs(){
    const wrap = document.getElementById('subjectTabs');
    wrap.innerHTML = '';
    SUBJECTS.forEach((name, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === 0 ? ' active' : '');
      btn.textContent = name;
      btn.onclick = () => selectSubject(name, btn);
      wrap.appendChild(btn);
    });
    selectSubject(SUBJECTS[0]);
  }

  function selectSubject(name, btnEl){
    currentSubject = name;
    document.querySelectorAll('#subjectTabs .tab').forEach(t => t.classList.toggle('active', t === btnEl || t.textContent === name));
    const files = resourcesBySubject[name] || [];
    const list = document.getElementById('filesList');
    list.innerHTML = '';
    if(!files.length){
      list.innerHTML = '<p class="empty-note">No resources uploaded for this subject yet.</p>';
      return;
    }
    files.forEach(f => {
      const row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML = `
        <div><span class="ftype mono">${(f.type || 'file')}</span><span class="fname">${escapeHTML(f.title || 'Untitled')}</span>${f.uploaded_by ? ` <span class="small-note">— ${escapeHTML(f.uploaded_by)}</span>` : ''}</div>
        <div class="file-actions">
          <a class="btn btn-sm" href="${f.url}" target="_blank" rel="noopener">Download</a>
          <button class="btn btn-sm" onclick="shareFile('${encodeURI(f.url)}','${(f.title||'').replace(/'/g,"\\'")}')">Share</button>
        </div>`;
      list.appendChild(row);
    });
  }

  async function uploadFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const statusEl = document.getElementById('uploadStatus');
    statusEl.textContent = 'Uploading…';
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const path = 'resources/' + currentSubject.replace(/\s+/g,'_') + '/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    try{
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, file, { upsert: true });
      if(upErr) throw upErr;
      const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(path);
      const { error: insErr } = await sb.from('resources').insert({
        subject: currentSubject,
        title: file.name.replace(/\.[^.]+$/, ''),
        type: ext,
        url: pub.publicUrl,
        uploaded_by: myName
      });
      if(insErr) throw insErr;
      statusEl.textContent = 'Uploaded ✓';
      await loadResources();
      const activeTab = [...document.querySelectorAll('#subjectTabs .tab')].find(t => t.textContent === currentSubject);
      selectSubject(currentSubject, activeTab);
    }catch(err){
      statusEl.textContent = '';
      alert('Upload failed: ' + err.message);
    }
    e.target.value = '';
  }

  async function shareFile(url, title){
    if(navigator.share){
      try{ await navigator.share({ title, url }); return; }catch(e){ /* cancelled */ }
    }
    try{ await navigator.clipboard.writeText(url); alert('Link copied to clipboard.'); }
    catch(e){ prompt('Copy this link:', url); }
  }

  function escapeHTML(str){ return String(str||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
</script>

</body>
</html>
